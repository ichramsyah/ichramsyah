<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
 
</head>
<body>
  <div class="layanan-header">
    
   
    <div class="layanan-item">
      <img src="https://ld-wt73.template-help.com/intense/intense-barbershop/images/icon-service-2-70x62.png" alt="">
      <div>
        <h2>Shaves</h2>

      </div>
    </div>
    <div class="layanan-item">
      <img src="https://ld-wt73.template-help.com/intense/intense-barbershop/images/icon-service-3-70x62.png" alt="">
      <div>
        <h2>Beard Trim</h2>

      </div>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100&family=Poppins:wght@100;200&family=Wix+Madefor+Display&display=swap');

  .layanan-header {
    display: flex;
    width: 100%;
    text-align: center;
    flex-wrap: wrap;
    justify-content: space-evenly;
  }

  .layanan-item {
    display: flex;
    align-items: center;
    width: 300px;
    margin: 10px;
    
  }


  .layanan h2 {
    color: black;
    font-size: 45px;
    letter-spacing: 5px;
    font-family: 'raleway';
    margin-top: 100px;
    text-align: left;
  }

  .layanan h2 span {
    border-bottom: solid 5px rgb(184, 161, 28);
    padding-bottom: 5px;
  }

  .layanan h3 {
    font-family: 'Arial';
    color: #8e8e8e;
    font-weight: 500;
    margin: 300px;
    margin-top: 2px;
    font-size: 16px;
    text-align: left;
  }

  @media (max-width: 480px) {
    .layanan h2 {
      color: black;
      font-size: 30px;
      letter-spacing: 2px;
      font-family: 'raleway';
      margin-top: 100px;
      text-align: left;
    }

    .layanan h2 span {
      border-bottom: solid 3px rgb(184, 161, 28);
      padding-bottom: 3px;
    }

    .layanan h3 {
      font-family: 'Arial';
      color: #8e8e8e;
      font-weight: 300;
      margin: 40px;
      letter-spacing: 2px;
      margin-top: 30px;
      font-size: 13px;
      text-align: left;
    }
  }

  
 
  .layanan-item img {
    width: 70px;
    height: 70px;
    margin-right: 10px;
  }

  .layanan-item h2 {
    color: black;
    font-size: 19px;
    transition: 0.3s;
    text-align: left;
  }

  .layanan-item h2:hover {
    color: rgb(184, 161, 28);
  }

  .layanan-item h2::after {
    color: black;
  }

  .layanan-item h3 {
    font-family: 'Arial';
    color: #8e8e8e;
    font-weight: 300;
    letter-spacing: 1px;
    margin-top: 10px;
    font-size: 14px;
    text-align: left;
  }

  @media (max-width: 480px) {
    .layanan-item {
      margin-top: 40px;
    }

    .layanan-item h3 {
      margin-top: -5px;
    }
  }
</style>
